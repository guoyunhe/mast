name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  i18n-tests:
    name: I18n Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[i18n]

      - name: Compile translation files
        run: make mo

      - name: Run i18n tests
        run: |
          python -m unittest tests.test_i18n -v

  gui-tests:
    name: GUI Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libxcb-xinerama0 xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[i18n,qt6]

      - name: Compile translation files
        run: make mo

      - name: Run GUI tests with xvfb
        run: |
          xvfb-run python -m unittest tests.test_app -v